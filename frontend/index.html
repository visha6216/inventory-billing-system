<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP System - Secure Login Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #12141c;
            color: #e4e6eb;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: #1a1d29;
            border: 1px solid #2d3142;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
            color: #ffffff;
        }

        p.subtitle {
            color: #cbd5e0;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: #cbd5e0;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background-color: #12141c;
            border: 1px solid #2d3142;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #38bdf8;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #38bdf8;
            color: #12141c;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #0ea5e9;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h1>System Access</h1>
    <p class="subtitle">Enter your operator credentials to unlock the ERP control node matrix.</p>

    <form id="loginForm">
        <div class="form-group">
            <label for="username">Operator Username</label>
            <input type="text" id="username" placeholder="e.g., admin" required>
        </div>
        <div class="form-group">
            <label for="password">Security Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit">Unlock Terminal</button>
    </form>
</div>

<script>
    const API_BASE_URL = "http://127.0.0.1:5000";

    document.getElementById("loginForm").addEventListener("submit", function(event) {
        event.preventDefault(); 

        const usernameInput = document.getElementById("username").value.trim();
        const passwordInput = document.getElementById("password").value.trim();

        if (!usernameInput || !passwordInput) {
            alert("Please fill out both username and password fields.");
            return;
        }

        console.log("Initiating login verification handshake...");

        // FIX: Points directly to /login matching your auth_routes setup
        fetch(`${API_BASE_URL}/login`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: usernameInput,
                password: passwordInput
            })
        })
        .then(response => {
            if (!response.ok) {
                if (response.status === 401) {
                    throw new Error("Invalid username or password. Connection Rejected.");
                } else {
                    throw new Error(`Server returned an error code: ${response.status}`);
                }
            }
            return response.json();
        })
        .then(data => {
            console.log("Authorization payload received:", data);

            const activeToken = data.token || data.access_token;

            if (activeToken) {
                // Save token so dashboard can use it for requests
                localStorage.setItem("auth_token", activeToken);
                window.location.href = "dashboard.html";
            } else {
                throw new Error("Authentication response is missing a valid token key.");
            }
        })
        .catch(error => {
            console.error("Login process failed:", error);
            alert(`Authentication Error: ${error.message}`);
        });
    });
</script>

</body>
</html>
